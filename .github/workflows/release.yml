name: Publish Release

on:
  push:
    tags:
      - "[0-9]*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - name: Check out tagged files
        uses: actions/checkout@v4

      - name: Create release and upload plug-in files
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
          ASSEMBLY_NAME: vObjectPropertiesPlus
        run: |
          $runtimes = @('net7.0-windows', 'net10.0-windows')
          $staging = Join-Path $env:RUNNER_TEMP "$env:ASSEMBLY_NAME-$env:RELEASE_TAG"
          New-Item -ItemType Directory -Path $staging -Force | Out-Null

          $assets = @()
          foreach ($runtime in $runtimes) {
            $source = Join-Path $PWD "bin/Release/$runtime/$env:ASSEMBLY_NAME.dll"
            if (-not (Test-Path -LiteralPath $source -PathType Leaf)) {
              throw "Could not find the $runtime $env:ASSEMBLY_NAME.dll in the tagged repository."
            }

            $asset = Join-Path $staging "$env:ASSEMBLY_NAME-$runtime.dll"
            Copy-Item -LiteralPath $source -Destination $asset -Force
            $assets += $asset
          }

          $ruiSource = Join-Path $PWD "Toolbar/$env:ASSEMBLY_NAME.rui"
          if (Test-Path -LiteralPath $ruiSource -PathType Leaf) {
            $ruiAsset = Join-Path $staging "$env:ASSEMBLY_NAME.rui"
            Copy-Item -LiteralPath $ruiSource -Destination $ruiAsset -Force
            $assets += $ruiAsset
          }

          $title = "$env:ASSEMBLY_NAME $env:RELEASE_TAG"

          & gh release view $env:RELEASE_TAG *> $null
          if ($LASTEXITCODE -eq 0) {
            & gh release upload $env:RELEASE_TAG @assets --clobber
          } else {
            & gh release create $env:RELEASE_TAG @assets --verify-tag --title $title --generate-notes
          }

          if ($LASTEXITCODE -ne 0) {
            throw "GitHub release publishing failed for $env:RELEASE_TAG."
          }